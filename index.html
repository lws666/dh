
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LWS导航页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
        }
        .card {
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.3);
        }
        .btn-green {
            background: linear-gradient(90deg, #22c55e, #16a34a);
            transition: all 0.3s;
        }
        .btn-green:hover {
            background: linear-gradient(90deg, #16a34a, #15803d);
            transform: scale(1.05);
        }
        .btn-blue {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            transition: all 0.3s;
        }
        .btn-blue:hover {
            background: linear-gradient(90deg, #2563eb, #1e40af);
            transform: scale(1.05);
        }
        .header-icon {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        /* 我的站点高亮样式 */
        .my-site {
            background: linear-gradient(90deg, #22c55e, #10b981);
            color: #000;
            font-weight: 700;
            transition: all 0.3s;
        }
        .my-site:hover {
            background: linear-gradient(90deg, #16a34a, #059669);
            transform: scale(1.03);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
    </style>
</head>
<body class="min-h-screen text-white font-sans">
    <div class="max-w-2xl mx-auto px-4 py-10">
        <!-- 头部 -->
        <div class="text-center mb-12">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-3xl text-5xl header-icon mb-6 shadow-xl">
                ☁️
            </div>
            <h1 class="text-5xl font-bold tracking-tighter mb-3">LWSNB</h1>
            <p class="text-3xl font-medium text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 to-cyan-300">我的个人站点</p>
            <div class="mt-6 max-w-md mx-auto text-slate-300 leading-relaxed">
                我的博客 · 邮箱 · 影视 · 图床 一键直达<br>
                <span class="text-amber-400 font-medium">仅限个人使用 禁止商业牟利！</span>
            </div>
        </div>

        <!-- 我的 LWSNB 站点 - 高亮置顶 -->
        <div class="mb-12">
            <h2 class="text-3xl font-bold text-center mb-6 text-emerald-400 flex items-center justify-center gap-3">
                <span>🏠</span> 我的个人站点
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 我的博客 -->
                <a href="https://www.lwsnb.dpdns.org/" target="_blank" 
                   class="my-site block p-8 rounded-3xl text-center shadow-2xl">
                    <div class="text-5xl mb-4">📝</div>
                    <div class="text-2xl font-bold">我的博客</div>
                    <div class="text-sm mt-2 opacity-80">www.lwsnb.dpdns.org</div>
                </a>
                
                <!-- 我的邮箱 -->
                <a href="https://email.lwsnb.dpdns.org/" target="_blank" 
                   class="my-site block p-8 rounded-3xl text-center shadow-2xl">
                    <div class="text-5xl mb-4">✉️</div>
                    <div class="text-2xl font-bold">我的邮箱</div>
                    <div class="text-sm mt-2 opacity-80">email.lwsnb.dpdns.org</div>
                </a>
                
                <!-- 我的影视 -->
                <a href="https://movie.lwsnb.dpdns.org/" target="_blank" 
                   class="my-site block p-8 rounded-3xl text-center shadow-2xl">
                    <div class="text-5xl mb-4">🎬</div>
                    <div class="text-2xl font-bold">我的影视</div>
                    <div class="text-sm mt-2 opacity-80">movie.lwsnb.dpdns.org</div>
                </a>

                <!-- 新增：我的图床 -->
                <a href="https://img.lwsnb.dpdns.org/" target="_blank" 
                   class="my-site block p-8 rounded-3xl text-center shadow-2xl">
                    <div class="text-5xl mb-4">🖼️</div>
                    <div class="text-2xl font-bold">我的图床</div>
                    <div class="text-sm mt-2 opacity-80">img.lwsnb.dpdns.org</div>
                </a>
            </div>
        </div>

        <!-- 底部 -->
        <div class="mt-16 text-center text-slate-400 text-sm">
            <p>© 2026 LWS免费公益云服务 | LWSNB个人站点</p>
        </div>
    </div>

    <script>
        tailwind.config = {
            content: [],
            theme: { extend: {} }
        }
    </script>
    <script type="text/javascript" src="https://myhkw.cn/player/js/jquery.min.js"></script>
    <script type="text/javascript" id="myhk" src="https://myhkw.cn/api/player/177936260120" key="177936260120" m="1"></script>
</body>
</html>
